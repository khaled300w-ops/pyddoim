<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خالد برو لمتصفح الويب</title>
    <style>
        /* CSS - التصميم عشان أخوك ما يقولش نتانة */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #2c3e50;
        }

        .toolbar {
            background-color: #34495e;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 8px;
            border-radius: 4px;
            border: none;
            outline: none;
        }

        button {
            padding: 8px 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2ecc71;
        }

        .browser-content {
            flex-grow: 1;
            background-color: white;
            border: none;
        }

        .status-bar {
            background-color: #34495e;
            color: #ecf0f1;
            font-size: 12px;
            padding: 5px 10px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="goBack()">◀</button>
        <button onclick="goForward()">▶</button>
        <button onclick="reload()">🔄</button>
        <input type="text" id="urlInput" placeholder="اكتب الرابط هنا (https://...)" value="https://www.google.com">
        <button onclick="loadUrl()">انطلق</button>
    </div>

    <iframe id="viewport" class="browser-content" src="https://www.bing.com"></iframe>


    <div class="status-bar" id="status">
        جاهز للعمل على Pentium 4 🚀
    </div>

    <script>
        const iframe = document.getElementById('viewport');
        const urlInput = document.getElementById('urlInput');
        const status = document.getElementById('status');

        function loadUrl() {
            let url = urlInput.value;
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            status.innerText = "جاري تحميل: " + url;
            iframe.src = url;
        }

        function reload() {
            iframe.src = iframe.src;
            status.innerText = "تم إعادة التحميل";
        }

        function goBack() {
            window.history.back();
        }

        function goForward() {
            window.history.forward();
        }

        // تشغيل الرابط عند الضغط على Enter
        urlInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                loadUrl();
            }
        });
    </script>
</body>
</html>
